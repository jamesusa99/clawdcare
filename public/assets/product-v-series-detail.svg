  <rect x="424" y="172" width="92" height="64" rx="6" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-opacity="0.7"/>
  <rect x="530" y="172" width="92" height="64" rx="6" fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-opacity="0.7"/>
  <rect x="318" y="252" width="304" height="10" rx="2" fill="#334155"/>
  <rect x="318" y="272" width="240" height="10" rx="2" fill="#2d3748"/>
  <rect x="318" y="292" width="280" height="10" rx="2" fill="#2d3748"/>
  <!-- SSD bay -->
