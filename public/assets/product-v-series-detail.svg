  </defs>
  <rect width="960" height="720" fill="url(#bg)"/>
  <!-- chassis -->
  <rect x="280" y="120" width="400" height="480" rx="28" fill="#161d26" stroke="#334155" stroke-width="2"/>
  <rect x="300" y="150" width="360" height="280" rx="12" fill="#0a0e14" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- three modules -->
