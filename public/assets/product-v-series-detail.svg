  <rect x="508" y="472" width="48" height="20" rx="3" fill="#0f172a" stroke="#64748b"/>
  <circle cx="568" cy="482" r="8" fill="#0f172a" stroke="#64748b"/>
  <!-- LEDs -->
  <circle cx="620" cy="476" r="4" fill="#22c55e" opacity="0.85"/>
  <circle cx="640" cy="476" r="4" fill="#38bdf8" opacity="0.7"/>
