  <rect x="332" y="472" width="96" height="14" rx="2" fill="#334155"/>
  <text x="380" y="514" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">M.2</text>
  <!-- ports row -->
